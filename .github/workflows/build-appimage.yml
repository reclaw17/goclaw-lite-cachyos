name: Build AppImage

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/build-appimage.yml'
      - 'всё-сразу.sh'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install OS deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            build-essential curl git \
            libnss3 libxss1 pkg-config fuse3

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm + wails
        run: |
          npm install -g pnpm
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          wails version
          wails doctor || true

      - name: Clone upstream
        run: |
          chmod +x scripts/*.sh || true
          bash scripts/clone-upstream.sh

      - name: Build Lite
        run: bash scripts/build-lite.sh

      - name: Package AppImage
        run: bash scripts/package-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: GoClaw-Lite-AppImage
          path: dist/*.AppImage
          if-no-files-found: warn

      - name: Publish release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: lite-linux-${{ github.run_number }}
          name: GoClaw Lite Linux AppImage #${{ github.run_number }}
          draft: false
          files: dist/*.AppImage
          body: |
            Experimental **Linux** GoClaw Lite AppImage (not official upstream).

            ```bash
            chmod +x GoClaw-Lite-x86_64.AppImage
            ./GoClaw-Lite-x86_64.AppImage
            ```

            If FUSE errors:
            ```bash
            ./GoClaw-Lite-x86_64.AppImage --appimage-extract-and-run
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
