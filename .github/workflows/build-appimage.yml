name: Build AppImage

# Simple meaning: GitHub builds the AppImage for you in the cloud.
# Open Actions → this workflow → Run workflow → download the file.

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Also try to publish a GitHub Release'
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/build-appimage.yml'

permissions:
  contents: write
  actions: read

concurrency:
  group: build-appimage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build GoClaw Lite AppImage
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install Ubuntu packages
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential pkg-config curl git ca-certificates \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libnss3 libxss1 libasound2t64 \
            fuse3 file python3
          pkg-config --exists webkit2gtk-4.1 && echo "webkit2gtk-4.1 OK"
          pkg-config --modversion webkit2gtk-4.1 || true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          # This packaging repo has no go.sum — avoid noisy cache restore errors
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm + Wails
        run: |
          set -euo pipefail
          npm install -g pnpm
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          export PATH="$(go env GOPATH)/bin:$PATH"
          go version
          node -v
          pnpm -v
          wails version
          wails doctor || true

      - name: Make scripts executable
        run: chmod +x scripts/*.sh setup-all.sh build.sh update.sh 2>/dev/null || true

      - name: Clone official GoClaw sources
        env:
          LANG_UI: en
          GOCLAW_BRANCH: dev
        run: bash scripts/clone-upstream.sh

      - name: Build Lite (sqliteonly + webkit2_41)
        env:
          LANG_UI: en
          CGO_ENABLED: '1'
          VERSION: ci-${{ github.run_number }}
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          bash scripts/build-lite.sh

      - name: Package AppImage
        env:
          LANG_UI: en
          APPIMAGE_EXTRACT_AND_RUN: '1'
          VERSION_TAG: ci-${{ github.run_number }}
        run: |
          set -euo pipefail
          bash scripts/package-appimage.sh
          test -f dist/GoClaw-Lite-x86_64.AppImage
          ls -lh dist/GoClaw-Lite-x86_64.AppImage
          file dist/GoClaw-Lite-x86_64.AppImage || true

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoClaw-Lite-x86_64-AppImage
          path: |
            dist/GoClaw-Lite-x86_64.AppImage
            dist/.goclaw-lite-version
            dist/.upstream-revision
          if-no-files-found: error

      # Release only on manual Run workflow — never fail the green build if publish is blocked
      - name: Publish GitHub Release
        id: release
        if: >-
          success() &&
          github.event_name == 'workflow_dispatch' &&
          inputs.publish_release == true
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.run_number }}
          name: GoClaw Lite AppImage (CI #${{ github.run_number }})
          files: dist/GoClaw-Lite-x86_64.AppImage
          generate_release_notes: false
          body: |
            Portable **GoClaw Lite** AppImage (community build for Arch/CachyOS).

            Built on Ubuntu 24.04 CI from upstream `nextlevelbuilder/goclaw` (dev).

            ### Run
            ```bash
            chmod +x GoClaw-Lite-x86_64.AppImage
            ./GoClaw-Lite-x86_64.AppImage
            ```

            ### Update later
            ```bash
            ./GoClaw-Lite-x86_64.AppImage --update
            ```

            Not an official upstream release.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notice if release publish failed
        if: steps.release.outcome == 'failure'
        run: |
          echo "::warning::Release publish failed (token/permissions). The AppImage artifact is still available under Actions → Artifacts."
          echo "Fix: Settings → Actions → General → Workflow permissions → Read and write."
